{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h2>Delete Medicine</h2>
</div>

<div class="card" style="max-width: 500px;">
    <p>Are you sure you want to delete <strong>{{ object.name }}</strong> ({{ object.batch_number }})?</p>
    <p style="color: var(--danger-color);">This action cannot be undone.</p>

    <form method="post" style="margin-top: 2rem;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirm Delete</button>
        <a href="{% url 'inventory:medicine_list' %}" class="btn"
            style="background: #e5e7eb; margin-left: 1rem;">Cancel</a>
    </form>
</div>
{% endblock %}
